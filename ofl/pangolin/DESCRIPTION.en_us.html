<p>
    Pangolin was designed for the Google Valentine's Day 2017 Doodle, <a href="https://doodles.google/doodle/valentines-day-2017-day-1/">Pangolin Love</a>. A pangolin is an endangered species native to Asia and Africa. The font is a sans serif handwriting style. It supports many languages that use the Latin and Cyrillic scripts.
