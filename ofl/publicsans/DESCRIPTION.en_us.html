<p>Based on <a href="https://fonts.google.com/specimen/Libre+Franklin">Libre Franklin</a>, Public Sans is a strong, neutral typeface for interfaces, text, and headings. It was Developed by the United States Web Design System.</p> 

<p>The family was upgraded to a variable font in May 2022.</p>

<p>To contribute, see <a href="https://github.com/uswds/public-sans">github.com/uswds/public-sans</a></p>
